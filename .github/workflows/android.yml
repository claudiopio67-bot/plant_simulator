name: Build Kivy APK

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ⚡ Cache = build veloce
    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: ${{ runner.os }}-buildozer

    # ✅ Java giusto
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 🔧 Dipendenze sistema (fix libffi/autoconf)
    - name: Install system deps
      run: |
        sudo apt install -y \
          python3-pip unzip wget \
          autoconf automake libtool \
          pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake ninja-build

    # 🐍 Python deps
    - name: Install Python deps
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36 python-for-android==2024.1.21

    # 📦 Android SDK (setup corretto)
    - name: Setup Android SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip

        mv cmdline-tools latest

    # ➕ PATH
    - name: Add SDK to PATH
      run: |
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

    # ✔️ Licenze
    - name: Accept licenses
      run: yes | sdkmanager --licenses

    # 📲 SDK packages
    - name: Install SDK packages
      run: |
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    # 🔨 Build APK
    - name: Build APK
      run: buildozer android debug

    # 📦 Upload artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

    # 🚀 Release automatica (solo su tag)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
